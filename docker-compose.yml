services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vulnerable_app
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d vulnerable_app"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - "4567:4567"
    environment:
      DATABASE_URL: postgres://appuser:apppass@db:5432/vulnerable_app
      JWT_SECRET: vulnerable-secret-key
      RACK_ENV: production
      PORT: "4567"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
